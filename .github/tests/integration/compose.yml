name: "integration"

x-lockdown: &lockdown
  # prevents write access to the image itself
  read_only: true
  # prevents any process within the container to gain more privileges
  security_opt:
    - "no-new-privileges=true"

services:
  main:
    image: "${IMAGE}"
    <<: *lockdown
    environment:
      TZ: "Europe/Zurich"
    volumes:
      - "lego.etc:/lego/etc"
      - "lego.var:/lego/var"
    tmpfs:
      # needed for read-only
      - "/run/secrets:uid=1000,gid=1000"
    networks:
      frontend:
    restart: "always"

volumes:
  lego.etc:
  lego.var:

networks:
  frontend: